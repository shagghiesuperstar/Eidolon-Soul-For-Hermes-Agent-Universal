# SPDX-License-Identifier: Apache-2.0
name: installer-test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  installer-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    name: installer (${{ matrix.os }}, ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install shellcheck
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y shellcheck
          elif command -v brew >/dev/null 2>&1; then
            brew install shellcheck
          fi
      - name: shellcheck install.sh
        run: shellcheck install.sh
      - name: dry-run
        run: bash install.sh --dry-run
      - name: build local wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: install from local wheel
        run: |
          WHL=$(ls dist/*.whl | head -1)
          bash install.sh --wheel-url="file://$PWD/$WHL" --no-hermes
