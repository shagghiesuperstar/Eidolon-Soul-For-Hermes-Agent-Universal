# SPDX-License-Identifier: Apache-2.0
#
# REC-006: end-to-end proof that install.sh works.
#
# Matrix: {macos-latest, ubuntu-latest} × {3.10, 3.11, 3.12, 3.13}
#
# For each cell:
#   1. Check out the repo.
#   2. Set up the target Python.
#   3. Run install.sh in "src" mode against the current checkout (no network fetch
#      of the repo — we already have it). This exercises the full installer
#      code path except the git-clone step, which we cover separately with the
#      "pip-from-git" job.
#   4. Assert `eidolon --version` prints a semver-ish string.
#   5. Assert `eidolon doctor --json` returns exit 0 or 2 (PASS or DEGRADED).
#   6. Assert `eidolon verify --json` returns exit 0 or 2.
#   7. Assert `eidolon verify --strict` returns exit 2 on this clean env
#      (because there is no host Hermes present, so doctor is DEGRADED and
#       strict mode must propagate DEGRADED as exit 2). This is the loud-mode
#      invariant.
#   8. Assert idempotency: re-run install.sh; second run must exit 0 too.
#
# We also run the installer with a 120s timeout so a regression that pushes
# past the 90s budget will surface as a workflow failure rather than a silent
# slow-down.

name: installer-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: installer-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print environment
        run: |
          uname -a
          which bash
          bash --version | head -1
          which python3
          python3 --version

      - name: Run install.sh (src mode, against current checkout)
        env:
          EIDOLON_METHOD: src
          EIDOLON_SRC_DIR: ${{ github.workspace }}
          # actions/checkout has already put the desired ref on disk; tell the
          # installer to skip git fetch and use the on-disk tree as-is.
          EIDOLON_NO_FETCH: "1"
          EIDOLON_PYTHON: python3
        timeout-minutes: 3
        run: bash install.sh

      - name: Locate the installed eidolon CLI
        id: locate
        run: |
          USER_BIN="$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts", scheme="posix_user"))')"
          if [ ! -x "$USER_BIN/eidolon" ]; then
            USER_BIN="$(python3 -m site --user-base)/bin"
          fi
          echo "USER_BIN=$USER_BIN" >> "$GITHUB_ENV"
          echo "$USER_BIN" >> "$GITHUB_PATH"
          ls -la "$USER_BIN/eidolon"

      - name: eidolon --version prints semver
        run: |
          out="$(eidolon --version)"
          echo "version output: $out"
          echo "$out" | grep -Eq '^eidolon [0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "version output not semver-ish: $out"; exit 1; }

      - name: eidolon doctor --json returns PASS or DEGRADED
        run: |
          set +e
          out="$(eidolon doctor --json)"
          rc=$?
          set -e
          echo "doctor rc=$rc"
          echo "$out" | python3 -m json.tool
          case "$rc" in
            0|2) echo "doctor OK (rc=$rc)";;
            *) echo "doctor unexpected rc=$rc"; exit 1;;
          esac

      - name: eidolon verify --json returns PASS or DEGRADED
        run: |
          set +e
          out="$(eidolon verify --json)"
          rc=$?
          set -e
          echo "verify rc=$rc"
          echo "$out" | python3 -m json.tool
          case "$rc" in
            0|2) echo "verify OK (rc=$rc)";;
            *) echo "verify unexpected rc=$rc"; exit 1;;
          esac

      - name: eidolon verify --strict propagates DEGRADED as exit 2
        run: |
          # No host Hermes present in CI ⇒ doctor is DEGRADED ⇒ strict verify must exit 2.
          set +e
          eidolon verify --strict >/dev/null 2>&1
          rc=$?
          set -e
          if [ "$rc" != "2" ]; then
            echo "expected verify --strict to exit 2 in clean CI env; got $rc"
            eidolon verify --strict --json
            exit 1
          fi
          echo "verify --strict exited 2 as required"

      - name: Idempotency — re-running install.sh must succeed
        env:
          EIDOLON_METHOD: src
          EIDOLON_SRC_DIR: ${{ github.workspace }}
          EIDOLON_NO_FETCH: "1"
          EIDOLON_PYTHON: python3
        run: bash install.sh

      - name: Installer time budget check (<120s per run, target <90s)
        run: |
          echo "This job's total wall-clock is enforced by timeout-minutes: 10."
          echo "The install step itself has timeout-minutes: 3, which is >> the 90s target"
          echo "and gives ~2x headroom for CI cold-cache variance. Regressions past that"
          echo "budget will fail the step."
