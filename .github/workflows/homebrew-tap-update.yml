name: homebrew-tap-update

# Auto-updates the Homebrew tap on every stable eidolon release.
# Triggered when a GitHub Release is published with a tag like v1.2.3
# (no dash suffix, matching the publish-pypi filter in release.yml).
#
# Requires a repo secret: HOMEBREW_TAP_PUSH_TOKEN
#   A fine-grained personal access token with contents:write on
#   eidolon-hermes/homebrew-eidolon. Set via GitHub Settings → Secrets.
#   Until this secret is configured, this workflow no-ops and prints a
#   clear message; it never fails the release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3) to bump the formula to'
        required: true

permissions:
  contents: read

jobs:
  bump-formula:
    name: Bump tap formula
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.release.tag_name, '-')
    steps:
      - name: Guard on tap push token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_PUSH_TOKEN not set; skipping tap update."
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            V="${TAG#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Bumping tap formula to eidolon-hermes ${V}"

      - name: Checkout source repo
        if: steps.guard.outputs.have_token == 'true'
        uses: actions/checkout@v4

      - name: Fetch PyPI sdist sha256
        if: steps.guard.outputs.have_token == 'true'
        id: sdist
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -eu
          URL="https://files.pythonhosted.org/packages/source/e/eidolon-hermes/eidolon_hermes-${VERSION}.tar.gz"
          echo "Downloading: $URL"
          # Retry: PyPI sometimes lags a few seconds behind release.
          for i in 1 2 3 4 5; do
            if curl -fsSL -o sdist.tgz "$URL"; then break; fi
            echo "attempt $i failed; sleeping"; sleep 10
          done
          SHA=$(sha256sum sdist.tgz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        if: steps.guard.outputs.have_token == 'true'
        uses: actions/checkout@v4
        with:
          repository: eidolon-hermes/homebrew-eidolon
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: tap

      - name: Update formula and commit
        if: steps.guard.outputs.have_token == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          NEW_URL: ${{ steps.sdist.outputs.url }}
          NEW_SHA: ${{ steps.sdist.outputs.sha256 }}
        run: |
          set -eu
          mkdir -p tap/Formula
          cp packaging/homebrew/eidolon.rb tap/Formula/eidolon.rb
          # Replace url, sha256, and version. Uses `|` as sed delim to avoid
          # escaping the URL slashes.
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("tap/Formula/eidolon.rb")
          txt = p.read_text()
          txt = re.sub(r'url\s+"[^"]+"', f'url "{os.environ["NEW_URL"]}"', txt, count=1)
          txt = re.sub(r'sha256\s+"[^"]+"', f'sha256 "{os.environ["NEW_SHA"]}"', txt, count=1)
          txt = re.sub(r'version\s+"[^"]+"', f'version "{os.environ["VERSION"]}"', txt, count=1)
          p.write_text(txt)
          PY
          cd tap
          git config user.name  "Eidolon Release Bot"
          git config user.email "eidolon-release-bot@users.noreply.github.com"
          git add Formula/eidolon.rb
          if git diff --cached --quiet; then
            echo "No changes to commit (formula already at ${VERSION})."
            exit 0
          fi
          git commit -m "eidolon ${VERSION}"
          git push origin HEAD

      - name: Skip notice
        if: steps.guard.outputs.have_token != 'true'
        run: |
          echo "Skipped tap update (no HOMEBREW_TAP_PUSH_TOKEN)."
          echo "This is fine for the initial merge of REC-012."
          echo "Configure the secret once the tap repo exists to enable auto-bump."
