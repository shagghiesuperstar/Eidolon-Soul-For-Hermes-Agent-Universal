name: adversarial

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  adversarial:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Adversarial guarantees (S1-S3)
        run: python tests/adversarial.py
      - name: Unit tests (CLI, doctor, report, rollback, router)
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests/unit -v
      - name: Hard constraint — no hardcoded models in src/
        env:
          PYTHONPATH: src
        run: python -m unittest tests.unit.test_no_hardcoded_models -v
