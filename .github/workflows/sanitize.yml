name: sanitize

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: PII sanitization scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-test
        run: python scripts/sanitize_check.py --self-test

      - name: Repo scan
        run: python scripts/sanitize_check.py
