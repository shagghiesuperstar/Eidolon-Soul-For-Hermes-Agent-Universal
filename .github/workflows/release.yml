name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  # `bump-citation` job overrides this with `contents: write` scoped to itself.

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version
        id: ver
        run: |
          V=$(PYTHONPATH=src python -c 'from eidolon._version import __version__; print(__version__)')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building eidolon-hermes ${V}"

      - name: Sanity — tag matches version on tagged pushes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          VER="${{ steps.ver.outputs.version }}"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag v$TAG does not match _version.py ($VER)"
            exit 1
          fi

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Twine check
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: pypi-test
      url: https://test.pypi.org/project/eidolon-hermes/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    environment:
      name: pypi-prod
      url: https://pypi.org/project/eidolon-hermes/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  bump-citation:
    name: Bump CITATION.cff version + date-released
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.CITATION_BUMP_PAT || secrets.GITHUB_TOKEN }}
      - name: Update CITATION.cff
        env:
          TAG: ${{ github.ref }}
        run: |
          set -e
          export CFF_VERSION="${TAG##refs/tags/v}"
          export CFF_DATE="$(date -u +%Y-%m-%d)"
          echo "Bumping CITATION.cff to version=$CFF_VERSION date-released=$CFF_DATE"
          python - <<'PY'
          import os, re
          from pathlib import Path
          version = os.environ["CFF_VERSION"]
          released = os.environ["CFF_DATE"]
          p = Path("CITATION.cff")
          text = p.read_text(encoding="utf-8")
          text = re.sub(r'^version: .*$', f'version: "{version}"', text, flags=re.M)
          text = re.sub(r'^date-released: .*$', f'date-released: "{released}"', text, flags=re.M)
          p.write_text(text, encoding="utf-8")
          PY
      - name: Commit + push
        run: |
          if git diff --quiet CITATION.cff; then
            echo "CITATION.cff already up-to-date; nothing to commit."
            exit 0
          fi
          git config user.name  "eidolon-agent[bot]"
          git config user.email "eidolon-agent@users.noreply.github.com"
          git add CITATION.cff
          git commit -m "chore(citation): bump to ${GITHUB_REF##refs/tags/v}"
          git push origin HEAD:main
